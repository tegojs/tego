name: Code Inspector

on:
  workflow_dispatch:
    inputs:
      run-coverage:
        description: Run test coverage job
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Test
        run: pnpm test -- --run --reporter=default --reporter=github-actions

  test-coverage:
    name: Test Coverage
    # Enable from the manual workflow dispatch input when coverage is ready.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-coverage }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Test coverage
        run: pnpm vitest --coverage.enabled true
      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
